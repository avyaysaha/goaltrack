<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0" stop-color="#17325c"/>
      <stop offset=".55" stop-color="#101c32"/>
      <stop offset="1" stop-color="#070d19"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldGlow">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000" flood-opacity=".65"/>
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ffd34e" flood-opacity=".55"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <text x="55" y="65" fill="#fff" font-family="Arial, sans-serif" font-size="24" font-weight="900">GROUP SECTOR MOCKUP</text>
  <text x="55" y="92" fill="#91a2ba" font-family="Arial, sans-serif" font-size="14">Two tournament rings · Groups A–L · national-color team dots</text>

  <!-- Twelve glowing arc sectors on both rings. -->
  <g fill="none" stroke-width="5" filter="url(#glow)" transform="rotate(-105 600 420)">
    <circle cx="600" cy="420" r="320" stroke="#ed334e" stroke-dasharray="163 1847"/>
    <circle cx="600" cy="420" r="320" stroke="#19bd68" stroke-dasharray="163 1847" transform="rotate(30 600 420)"/>
    <circle cx="600" cy="420" r="320" stroke="#1769e0" stroke-dasharray="163 1847" transform="rotate(60 600 420)"/>
    <circle cx="600" cy="420" r="320" stroke="#ed334e" stroke-dasharray="163 1847" transform="rotate(90 600 420)"/>
    <circle cx="600" cy="420" r="320" stroke="#19bd68" stroke-dasharray="163 1847" transform="rotate(120 600 420)"/>
    <circle cx="600" cy="420" r="320" stroke="#1769e0" stroke-dasharray="163 1847" transform="rotate(150 600 420)"/>
    <circle cx="600" cy="420" r="320" stroke="#ed334e" stroke-dasharray="163 1847" transform="rotate(180 600 420)"/>
    <circle cx="600" cy="420" r="320" stroke="#19bd68" stroke-dasharray="163 1847" transform="rotate(210 600 420)"/>
    <circle cx="600" cy="420" r="320" stroke="#1769e0" stroke-dasharray="163 1847" transform="rotate(240 600 420)"/>
    <circle cx="600" cy="420" r="320" stroke="#ed334e" stroke-dasharray="163 1847" transform="rotate(270 600 420)"/>
    <circle cx="600" cy="420" r="320" stroke="#19bd68" stroke-dasharray="163 1847" transform="rotate(300 600 420)"/>
    <circle cx="600" cy="420" r="320" stroke="#1769e0" stroke-dasharray="163 1847" transform="rotate(330 600 420)"/>
  </g>
  <circle cx="600" cy="420" r="230" fill="none" stroke="#59718f" stroke-width="2"/>
  <circle cx="600" cy="420" r="270" fill="none" stroke="#59718f" stroke-width="2" stroke-dasharray="4 8"/>

  <!-- A reusable sector: divider, label, and four team dots. -->
  <g id="sector">
    <line x1="600" y1="190" x2="600" y2="100" stroke="#b9c8db" stroke-width="1.5" opacity=".8"/>
    <circle cx="570" cy="145" r="7" fill="#ed334e" stroke="#fff" stroke-width="2"/>
    <circle cx="590" cy="155" r="7" fill="#19bd68" stroke="#fff" stroke-width="2"/>
    <circle cx="610" cy="155" r="7" fill="#1769e0" stroke="#fff" stroke-width="2"/>
    <circle cx="630" cy="145" r="7" fill="#f0b429" stroke="#fff" stroke-width="2"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="15" font-weight="900" fill="#fff" text-anchor="middle">
    <g transform="rotate(0 600 420)"><use href="#sector"/><text x="600" y="125">GROUP A</text></g>
    <g transform="rotate(30 600 420)"><use href="#sector"/><text x="600" y="125">GROUP B</text></g>
    <g transform="rotate(60 600 420)"><use href="#sector"/><text x="600" y="125">GROUP C</text></g>
    <g transform="rotate(90 600 420)"><use href="#sector"/><text x="600" y="125">GROUP D</text></g>
    <g transform="rotate(120 600 420)"><use href="#sector"/><text x="600" y="125">GROUP E</text></g>
    <g transform="rotate(150 600 420)"><use href="#sector"/><text x="600" y="125">GROUP F</text></g>
    <g transform="rotate(180 600 420)"><use href="#sector"/><text x="600" y="125">GROUP G</text></g>
    <g transform="rotate(210 600 420)"><use href="#sector"/><text x="600" y="125">GROUP H</text></g>
    <g transform="rotate(240 600 420)"><use href="#sector"/><text x="600" y="125">GROUP I</text></g>
    <g transform="rotate(270 600 420)"><use href="#sector"/><text x="600" y="125">GROUP J</text></g>
    <g transform="rotate(300 600 420)"><use href="#sector"/><text x="600" y="125">GROUP K</text></g>
    <g transform="rotate(330 600 420)"><use href="#sector"/><text x="600" y="125">GROUP L</text></g>
  </g>

  <circle cx="600" cy="420" r="112" fill="#fff" opacity=".08"/>
  <image href="trionda-ball.png" x="500" y="320" width="200" height="200" preserveAspectRatio="xMidYMid slice" clip-path="circle(100px at 100px 100px)"/>
  <image href="world-cup-trophy.png" x="550" y="245" width="100" height="220" preserveAspectRatio="xMidYMid meet" filter="url(#goldGlow)"/>

  <g font-family="Arial, sans-serif" font-size="13" fill="#b9c8db">
    <circle cx="930" cy="720" r="7" fill="#19bd68"/><text x="945" y="725">Team dots stay inside their group sector</text>
    <path d="M930 750h45" stroke="#fff" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="985" y="755">Advancement moves inward</text>
  </g>
</svg>
