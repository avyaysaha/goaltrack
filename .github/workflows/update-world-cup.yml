name: Update World Cup data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: world-cup-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Explain missing API key
        if: env.API_FOOTBALL_KEY == ''
        run: echo "::warning::Add the repository secret API_FOOTBALL_KEY to enable scheduled updates."

      - name: Fetch tournament data
        if: env.API_FOOTBALL_KEY != ''
        run: node scripts/update-world-cup.mjs

      - name: Commit changed data
        if: env.API_FOOTBALL_KEY != ''
        run: |
          if git diff --quiet -- live-data.js data/live-data.json; then
            echo "No tournament changes found."
            exit 0
          fi
          git config user.name "goaltrack-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add live-data.js data/live-data.json
          git commit -m "Update World Cup data"
          git push
